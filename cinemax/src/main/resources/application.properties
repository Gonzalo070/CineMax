# =====================================================
# CineMax - Configuración de la Aplicación
# =====================================================

# Servidor
server.port=8080

# Base de Datos (XAMPP: MariaDB en localhost:3306)
# IMPORTANTE: Usa SOLO el MySQL del panel XAMPP. Desactiva el servicio Windows "MySQL92"
# (ambos usan el puerto 3306 y se apagan mutuamente).
spring.datasource.url=jdbc:mysql://localhost:3306/cineMax?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate (XAMPP trae MariaDB, no MySQL de Oracle)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Jackson - serialización de fechas
spring.jackson.serialization.write-dates-as-timestamps=false
